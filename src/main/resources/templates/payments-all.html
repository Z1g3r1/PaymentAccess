<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Все платежи</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="mb-4">💰 Все платежи</h1>
    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Сумма</th>
            <th>Email</th>
            <th>Статус</th>
            <th>Дата</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="payment : ${payments}">
            <td th:text="${payment.id}"></td>
            <td th:text="${payment.amount}"></td>
            <td th:text="${payment.payerEmail}"></td>
            <td th:text="${payment.status}"></td>
            <td th:text="${payment.createdAt}"></td>
        </tr>
        </tbody>
    </table>
    <a href="/payments" class="btn btn-outline-primary">← Вернуться к оплате</a>
</div>
</body>
</html>
