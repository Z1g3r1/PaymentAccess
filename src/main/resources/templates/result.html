<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Результат оплаты</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div th:if="${success}" class="card p-4 shadow-sm border-success">
                <h2 class="text-success">✅ Оплата успешна!</h2>
                <p th:text="${message}"></p>
                <a href="/payments" class="btn btn-primary">Оплатить ещё</a>
            </div>
            <div th:unless="${success}" class="card p-4 shadow-sm border-danger">
                <h2 class="text-danger">❌ Ошибка оплаты</h2>
                <p th:text="${message}"></p>
                <a href="/payments" class="btn btn-secondary">Попробовать снова</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
