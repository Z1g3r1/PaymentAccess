<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Оплата доступа</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="text-center mb-4">💰 Оплата доступа</h1>
    <div class="row justify-content-center">
        <div class="col-md-4">
            <form th:action="@{/payments}" method="post" class="card p-4 shadow-sm">
                <div class="mb-3">
                    <label for="amount" class="form-label">Сумма (₽)</label>
                    <input type="number" step="0.01" name="amount" id="amount"
                           class="form-control" placeholder="100.00" required>
                </div>
                <div class="mb-3">
                    <label for="payerEmail" class="form-label">Email</label>
                    <input type="email" name="payerEmail" id="payerEmail"
                           class="form-control" placeholder="user@example.com" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Оплатить</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
